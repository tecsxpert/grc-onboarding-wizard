spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:h2:mem:testdb}
    driver-class-name: ${TEST_DB_DRIVER:org.h2.Driver}
    username: ${TEST_DB_USERNAME:sa}
    password: ${TEST_DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: ${TEST_JPA_DDL:create-drop}

  flyway:
    enabled: ${TEST_FLYWAY_ENABLED:false}

  mail:
    host: ${TEST_MAIL_HOST:localhost}
    port: ${TEST_MAIL_PORT:1025}
    username: ${TEST_MAIL_USERNAME:test}
    password: ${TEST_MAIL_PASSWORD:test}

  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}

jwt:
  secret: ${TEST_JWT_SECRET:testsecretkey123456789}
  expiration: ${TEST_JWT_EXPIRATION:3600000}