spring:
  datasource:
    # Use environment variables with default fallbacks
    url: ${DB_URL:jdbc:h2:mem:testdb}
    driver-class-name: org.h2.Driver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update # Changed from create-drop for safer defaults

  flyway:
    enabled: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:test}
    password: ${MAIL_PASS:test}

jwt:

  secret: ${JWT_SECRET:your_placeholder_secret_at_least_32_chars_long}
  expiration: ${JWT_EXPIRATION:3600000}


  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}