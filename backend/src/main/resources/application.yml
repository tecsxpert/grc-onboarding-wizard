spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  security:
    user:
      name: ${APP_ADMIN_USER:admin}
      password: ${APP_ADMIN_PASS:admin123}

  datasource:
    # Use environment variables for DB connection
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tooldb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password_placeholder}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your_email@gmail.com}
    password: ${MAIL_PASSWORD:app_password_placeholder}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}

jwt:
  # Ensure this secret is at least 32-64 characters in production
  secret: ${JWT_SECRET:placeholder_secret_key_for_dev_only}

management:
  endpoints:
    web:
      exposure:
        include: health